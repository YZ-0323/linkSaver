<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Saver</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
      margin-top: 40px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
    }

    .input-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .link-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .link-item a {
      color: #2563eb;
      text-decoration: none;
      word-break: break-all;
    }

    .actions button {
      background: #ef4444;
      margin-left: 10px;
    }
    table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border-bottom: 1px solid #eee;
}

th {
  background: #f9fafb;
}
  </style>
</head>
<body>
  <div class="container">
    <h1>Link Saver</h1>
    <button onclick="loginAdmin()">管理员登录</button>
    <div class="input-area">
      <input id="name" placeholder="网站名称，例如 Google" />
      <input id="url" placeholder="输入网址，例如 https://google.com" />
      <button onclick="addLink()">保存</button>
    </div>

    <table style="width:100%; border-collapse: collapse;">
  <thead>
    <tr>
      <th style="text-align:left; padding:10px;">名称</th>
      <th style="text-align:left; padding:10px;">链接</th>
      <th style="text-align:left; padding:10px;">操作</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>
  </div>

  <script>
  let links = JSON.parse(localStorage.getItem('links') || '[]');
  let isAdmin = false;
function loginAdmin() {
  const pass = prompt("请输入管理员密码");

  if (pass === "123456") {
    isAdmin = true;
    alert("已进入管理员模式");
    render();
  } else {
    alert("密码错误");
  }
}

function save() {
  localStorage.setItem('links', JSON.stringify(links));
}

function addLink() {
  if (!isAdmin) return alert("你没有权限");

  const name = document.getElementById('name').value.trim();
  let url = document.getElementById('url').value.trim();

  if (!name || !url) return alert('请填写完整信息');

  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
  }

  links.push({ name, url });
  save();
  render();
}

function deleteLink(index) {
  if (!isAdmin) return alert("你没有权限");

  links.splice(index, 1);
  save();
  render();
}

function editLink(index) {
  if (!isAdmin) return alert("你没有权限");

  const newName = prompt("新名称：", links[index].name);
  const newUrl = prompt("新网址：", links[index].url);

  if (!newName || !newUrl) return;

  let url = newUrl;
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'https://' + url;
  }

  links[index] = { name: newName, url };
  save();
  render();
}

function render() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  links.forEach((item, index) => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td style="padding:10px; border-bottom:1px solid #eee;">
        ${item.name}
      </td>

      <td style="padding:10px; border-bottom:1px solid #eee;">
        <a href="${item.url}" target="_blank">
          ${item.url}
        </a>
      </td>

      <td style="padding:10px; border-bottom:1px solid #eee;">
        <button onclick="editLink(${index})">编辑</button>
        <button onclick="deleteLink(${index})" style="background:#ef4444;">删除</button>
      </td>
    `;

    list.appendChild(tr);
  });
}

render();
  </script>
</body>
</html>

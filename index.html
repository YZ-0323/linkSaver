<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Saver</title>

  <style>
    body {
      font-family: Arial;
      background: #f6f7fb;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 800px;
      margin-top: 40px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    h1 { text-align: center; }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    button {
      padding: 10px 12px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: middle;
    }

    a {
      color: #2563eb;
      word-break: break-all;
    }

    .danger {
      background: #ef4444;
    }

    .danger:hover {
      background: #dc2626;
    }

    .edit {
      background: #f59e0b;
    }

    .edit:hover {
      background: #d97706;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>Link Saver</h1>

  <button onclick="loginAdmin()">管理员登录</button>

  <div class="input-area">
    <input id="name" placeholder="网站名称" />
    <input id="url" placeholder="网址" />
    <button onclick="addLink()">保存</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>名称</th>
        <th>链接</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>

</div>

<script>
let links = JSON.parse(localStorage.getItem("links") || "[]");
let isAdmin = false;

const ADMIN_PASS = "123456"; // ⚠️ 只是前端门禁

function loginAdmin() {
  const pass = prompt("请输入管理员密码");

  if (pass === ADMIN_PASS) {
    isAdmin = true;
    alert("管理员模式已开启");
    render();
  } else {
    alert("密码错误");
  }
}

function save() {
  localStorage.setItem("links", JSON.stringify(links));
}

function fixUrl(url) {
  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    return "https://" + url;
  }
  return url;
}

function addLink() {
  if (!isAdmin) return alert("无权限");

  const name = document.getElementById("name").value.trim();
  let url = document.getElementById("url").value.trim();

  if (!name || !url) return alert("请填写完整");

  url = fixUrl(url);

  links.push({ name, url });
  save();
  render();

  document.getElementById("name").value = "";
  document.getElementById("url").value = "";
}

function deleteLink(index) {
  if (!isAdmin) return alert("无权限");

  links.splice(index, 1);
  save();
  render();
}

function editLink(index) {
  if (!isAdmin) return alert("无权限");

  const newName = prompt("新名称", links[index].name);
  let newUrl = prompt("新网址", links[index].url);

  if (!newName || !newUrl) return;

  newUrl = fixUrl(newUrl);

  links[index] = { name: newName, url: newUrl };

  save();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  links.forEach((item, index) => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.name}</td>
      <td><a href="${item.url}" target="_blank">${item.url}</a></td>
      <td>
        <button class="edit" onclick="editLink(${index})">编辑</button>
        <button class="danger" onclick="deleteLink(${index})">删除</button>
      </td>
    `;

    list.appendChild(tr);
  });
}

render();
</script>

</body>
</html>
